name: Feature request
description: Suggest a capability or ecosystem detector.
title: "[feat] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Sentinel doesn't support?
    validations: { required: true }

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Rough sketch of what the solution could look like.
    validations: { required: true }

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
