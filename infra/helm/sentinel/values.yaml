global:
  imageRegistry: ghcr.io/theneuralhorizon
  imageTag: "0.1.0"
  imagePullPolicy: IfNotPresent

api:
  replicas: 2
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: "1",  memory: 512Mi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70

scanner:
  replicas: 2
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: "2",  memory: 1Gi }

analyzer:
  replicas: 2
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "2",  memory: 1Gi }

web:
  replicas: 2

postgres:
  enabled: true
  storage: 20Gi

dragonfly:
  enabled: true

nats:
  enabled: true
  storage: 5Gi

ingress:
  enabled: true
  className: nginx
  host: sentinel.example.com
  tlsSecret: sentinel-tls

secrets:
  apiJwtSecret: "change-me-in-prod-min-32-chars-abcdef"
  anthropicApiKey: ""
  n8nApiKey: ""
