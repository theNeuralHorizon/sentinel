apiVersion: v1
kind: Service
metadata:
  name: sentinel-api
  namespace: sentinel
spec:
  selector: { app: sentinel-api }
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-api
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels: { app: sentinel-api }
  template:
    metadata:
      labels: { app: sentinel-api }
    spec:
      serviceAccountName: default
      containers:
        - name: api
          image: ghcr.io/theneuralhorizon/sentinel-api:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 4000 }]
          envFrom:
            - configMapRef: { name: sentinel-config }
            - secretRef:    { name: sentinel-secrets }
          readinessProbe:
            httpGet: { path: /readyz, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 4000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: "1",  memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentinel-api
  namespace: sentinel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentinel-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
