apiVersion: v1
kind: Service
metadata:
  name: sentinel-analyzer
  namespace: sentinel
spec:
  selector: { app: sentinel-analyzer }
  ports: [{ port: 4200, targetPort: 4200 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-analyzer
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels: { app: sentinel-analyzer }
  template:
    metadata:
      labels: { app: sentinel-analyzer }
    spec:
      containers:
        - name: analyzer
          image: ghcr.io/theneuralhorizon/sentinel-analyzer:latest
          ports: [{ containerPort: 4200 }]
          envFrom:
            - configMapRef: { name: sentinel-config }
            - secretRef:    { name: sentinel-secrets }
          readinessProbe:
            httpGet: { path: /healthz, port: 4200 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "2",  memory: 1Gi }
