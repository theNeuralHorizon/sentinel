apiVersion: v1
kind: Service
metadata:
  name: sentinel-dragonfly
  namespace: sentinel
spec:
  selector: { app: sentinel-dragonfly }
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-dragonfly
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels: { app: sentinel-dragonfly }
  template:
    metadata:
      labels: { app: sentinel-dragonfly }
    spec:
      containers:
        - name: dragonfly
          image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
          args: ["--logtostderr"]
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: "1",  memory: 1Gi }
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 3
