apiVersion: v1
kind: Service
metadata:
  name: sentinel-nats
  namespace: sentinel
spec:
  selector: { app: sentinel-nats }
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sentinel-nats
  namespace: sentinel
spec:
  serviceName: sentinel-nats
  replicas: 1
  selector:
    matchLabels: { app: sentinel-nats }
  template:
    metadata:
      labels: { app: sentinel-nats }
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-js", "-m", "8222", "-sd", "/data"]
          ports:
            - { containerPort: 4222 }
            - { containerPort: 8222 }
          readinessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 3
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: "1",  memory: 512Mi }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 5Gi } }
