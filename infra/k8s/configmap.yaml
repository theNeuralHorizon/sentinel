apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-config
  namespace: sentinel
data:
  NODE_ENV: production
  LOG_LEVEL: info
  API_HOST: 0.0.0.0
  API_PORT: "4000"
  SCANNER_HOST: 0.0.0.0
  SCANNER_PORT: "4100"
  SCANNER_URL: http://sentinel-scanner:4100
  ANALYZER_HOST: 0.0.0.0
  ANALYZER_PORT: "4200"
  ANALYZER_URL: http://sentinel-analyzer:4200
  DATABASE_URL: postgres://sentinel:sentinel@sentinel-postgres:5432/sentinel
  REDIS_URL: redis://sentinel-dragonfly:6379/0
  NATS_URL: nats://sentinel-nats:4222
  N8N_URL: http://sentinel-n8n:5678
  ANTHROPIC_MODEL: claude-opus-4-7
  OTEL_EXPORTER_OTLP_ENDPOINT: http://sentinel-otel-collector:4317
---
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  namespace: sentinel
type: Opaque
stringData:
  # Replace via sealed-secrets / ExternalSecrets in production.
  API_JWT_SECRET: "change-me-in-prod-min-32-chars-abcdef"
  ANTHROPIC_API_KEY: ""
  N8N_API_KEY: ""
