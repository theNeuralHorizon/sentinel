apiVersion: v1
kind: Service
metadata:
  name: sentinel-web
  namespace: sentinel
spec:
  selector: { app: sentinel-web }
  ports: [{ port: 3000, targetPort: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-web
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels: { app: sentinel-web }
  template:
    metadata:
      labels: { app: sentinel-web }
    spec:
      containers:
        - name: web
          image: ghcr.io/theneuralhorizon/sentinel-web:latest
          ports: [{ containerPort: 3000 }]
          env:
            - { name: NODE_ENV, value: production }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 3
          resources:
            requests: { cpu: 50m,  memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinel
  namespace: sentinel
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  tls:
    - hosts: [sentinel.example.com]
      secretName: sentinel-tls
  rules:
    - host: sentinel.example.com
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend: { service: { name: sentinel-api, port: { number: 4000 } } }
          - path: /ws
            pathType: Prefix
            backend: { service: { name: sentinel-api, port: { number: 4000 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: sentinel-web, port: { number: 3000 } } }
